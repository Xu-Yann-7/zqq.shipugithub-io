<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>减脂饮食小助理</title>
    <style>
        :root {
            --bg-color: #fffbf2;
            --card-color: #f9f2e5;
            --pink-color: #d8a899;
            --brown-color: #967259;
            --text-color: #5c4033;
            --light-brown: #c9a67c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        .sticky-note {
            background: var(--card-color);
            border-radius: 4px;
            box-shadow: 
                2px 2px 0 rgba(150, 114, 89, 0.1),
                4px 4px 0 rgba(150, 114, 89, 0.05);
            position: relative;
        }

        .sticky-note::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 20px;
            width: 60px;
            height: 20px;
            background: linear-gradient(to right, rgba(216, 168, 153, 0.3), rgba(150, 114, 89, 0.2));
            border-radius: 50%;
            transform: rotate(-3deg);
        }

        .ripped-edge {
            position: relative;
        }

        .ripped-edge::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 12px;
            background: 
                radial-gradient(ellipse at 0% 50%, var(--bg-color) 50%, transparent 50%),
                radial-gradient(ellipse at 10% 50%, transparent 45%, var(--bg-color) 50%),
                radial-gradient(ellipse at 20% 50%, var(--bg-color) 50%, transparent 50%),
                radial-gradient(ellipse at 30% 50%, transparent 45%, var(--bg-color) 50%),
                radial-gradient(ellipse at 40% 50%, var(--bg-color) 50%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, transparent 45%, var(--bg-color) 50%),
                radial-gradient(ellipse at 60% 50%, var(--bg-color) 50%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, transparent 45%, var(--bg-color) 50%),
                radial-gradient(ellipse at 80% 50%, var(--bg-color) 50%, transparent 50%),
                radial-gradient(ellipse at 90% 50%, transparent 45%, var(--bg-color) 50%),
                radial-gradient(ellipse at 100% 50%, var(--bg-color) 50%, transparent 50%);
            background-size: 10% 100%;
            background-repeat: repeat-x;
        }

        .hand-drawn-border {
            border: 2px solid var(--brown-color);
            border-radius: 8px;
            position: relative;
        }

        .hand-drawn-border::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 1px dashed var(--pink-color);
            border-radius: 6px;
        }

        .header {
            background: linear-gradient(135deg, var(--pink-color) 0%, var(--brown-color) 100%);
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 10%;
            right: 10%;
            height: 20px;
            background: inherit;
            transform: skewY(-2deg);
            z-index: -1;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 20px 20px;
            flex-wrap: wrap;
        }

        .nav-tab {
            background: var(--card-color);
            border: 2px solid var(--brown-color);
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            color: var(--brown-color);
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 3px 3px 0 rgba(150, 114, 89, 0.2);
        }

        .nav-tab:hover {
            transform: translateY(-2px);
            box-shadow: 5px 5px 0 rgba(150, 114, 89, 0.3);
        }

        .nav-tab.active {
            background: var(--brown-color);
            color: white;
            border-color: var(--brown-color);
        }

        .nav-tab.active::before {
            content: '✓';
            position: absolute;
            left: 8px;
            color: var(--pink-color);
        }

        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--brown-color);
            border-radius: 25px;
            font-size: 16px;
            background: white;
            box-shadow: 2px 2px 0 rgba(150, 114, 89, 0.1);
        }

        .search-bar button {
            padding: 12px 24px;
            background: var(--pink-color);
            border: 2px solid var(--pink-color);
            border-radius: 25px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 0 rgba(216, 168, 153, 0.3);
        }

        .search-bar button:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 rgba(216, 168, 153, 0.4);
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 8px 16px;
            background: var(--card-color);
            border: 1px solid var(--brown-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--brown-color);
            transition: all 0.3s ease;
        }

        .category-tab.active {
            background: var(--brown-color);
            color: white;
        }

        .category-tab:nth-child(odd):not(.active) {
            background: rgba(216, 168, 153, 0.2);
            border-color: var(--pink-color);
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .food-card {
            background: var(--card-color);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            box-shadow: 4px 4px 0 rgba(150, 114, 89, 0.1);
            border: 1px solid rgba(150, 114, 89, 0.2);
        }

        .food-card:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 0 rgba(150, 114, 89, 0.15);
        }

        .food-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--pink-color) 0%, var(--light-brown) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .food-info {
            flex: 1;
        }

        .food-name {
            font-weight: 600;
            color: var(--text-color);
            margin-bottom: 2px;
        }

        .food-category {
            font-size: 12px;
            color: var(--brown-color);
            background: rgba(150, 114, 89, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
        }

        .food-calories {
            font-size: 18px;
            font-weight: 700;
            color: var(--pink-color);
            margin-top: 4px;
        }

        .add-btn {
            width: 36px;
            height: 36px;
            background: var(--pink-color);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 2px 2px 0 rgba(216, 168, 153, 0.3);
        }

        .add-btn:hover {
            transform: scale(1.1);
            box-shadow: 3px 3px 0 rgba(216, 168, 153, 0.4);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            position: relative;
            box-shadow: 10px 10px 0 rgba(150, 114, 89, 0.2);
        }

        .modal h3 {
            color: var(--text-color);
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--brown-color);
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            background: white;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: 2px solid var(--brown-color);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .modal-buttons .cancel-btn {
            background: white;
            color: var(--brown-color);
        }

        .modal-buttons .confirm-btn {
            background: var(--brown-color);
            color: white;
        }

        .modal-buttons button:hover {
            transform: translateY(-2px);
        }

        .add-food-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--pink-color) 0%, var(--brown-color) 100%);
            border-radius: 50%;
            color: white;
            font-size: 28px;
            border: none;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(150, 114, 89, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .add-food-btn:hover {
            transform: scale(1.1);
            box-shadow: 6px 6px 0 rgba(150, 114, 89, 0.4);
        }

        .menu-generator {
            max-width: 800px;
            margin: 0 auto;
        }

        .input-section {
            background: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 6px 6px 0 rgba(150, 114, 89, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--brown-color);
            border-radius: 8px;
            font-size: 18px;
            background: white;
        }

        .flavor-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .flavor-btn {
            padding: 10px 24px;
            border: 2px solid var(--brown-color);
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
            color: var(--brown-color);
        }

        .flavor-btn.active {
            background: var(--pink-color);
            border-color: var(--pink-color);
            color: white;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: var(--brown-color);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(150, 114, 89, 0.3);
            transition: all 0.3s ease;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 6px 6px 0 rgba(150, 114, 89, 0.4);
        }

        .menu-display {
            background: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 6px 6px 0 rgba(150, 114, 89, 0.1);
            position: relative;
        }

        .menu-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 20px;
            text-align: center;
        }

        .menu-calories {
            font-size: 32px;
            font-weight: 700;
            color: var(--pink-color);
            text-align: center;
            margin-bottom: 25px;
        }

        .nutrient-tags {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nutrient-tag {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .nutrient-tag.carbs {
            background: linear-gradient(135deg, #c9a67c 0%, var(--brown-color) 100%);
        }

        .nutrient-tag.protein {
            background: linear-gradient(135deg, var(--pink-color) 0%, #b8958a 100%);
        }

        .nutrient-tag.fat {
            background: linear-gradient(135deg, #dbc4a8 0%, var(--light-brown) 100%);
        }

        .menu-items {
            margin-top: 20px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid var(--pink-color);
            position: relative;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--pink-color);
            border-radius: 50%;
        }

        .menu-item-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .menu-item-detail {
            font-size: 14px;
            color: var(--brown-color);
        }

        .stats-section {
            max-width: 900px;
            margin: 0 auto;
        }

        .daily-intake {
            background: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 6px 6px 0 rgba(150, 114, 89, 0.1);
        }

        .progress-bar-container {
            margin: 20px 0;
        }

        .progress-bar-bg {
            height: 30px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--brown-color);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--pink-color) 0%, var(--brown-color) 100%);
            border-radius: 13px;
            transition: width 0.5s ease;
        }

        .calories-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .calorie-item {
            text-align: center;
            flex: 1;
        }

        .calorie-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--pink-color);
        }

        .calorie-label {
            font-size: 14px;
            color: var(--brown-color);
        }

        .daily-list {
            margin-top: 25px;
        }

        .daily-list h3 {
            color: var(--text-color);
            margin-bottom: 15px;
            font-size: 18px;
        }

        .daily-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            margin-bottom: 8px;
            border-radius: 8px;
            position: relative;
        }

        .daily-item::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 20px;
            background: var(--pink-color);
            border-radius: 0 2px 2px 0;
        }

        .daily-item-name {
            font-weight: 600;
            color: var(--text-color);
        }

        .daily-item-calories {
            font-weight: 600;
            color: var(--brown-color);
            margin-right: 30px;
        }

        .delete-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: #ff6b6b;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ff4757;
            transform: translateY(-50%) scale(1.1);
        }

        .weekly-stats {
            background: var(--card-color);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 6px 6px 0 rgba(150, 114, 89, 0.1);
        }

        .weekly-stats h3 {
            color: var(--text-color);
            margin-bottom: 30px;
            font-size: 20px;
            text-align: center;
        }

        .chart-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 250px;
            padding: 20px 0;
        }

        .chart-bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 12%;
        }

        .chart-bar {
            width: 100%;
            max-width: 60px;
            background: linear-gradient(180deg, var(--pink-color) 0%, var(--brown-color) 100%);
            border-radius: 8px 8px 0 0;
            position: relative;
            min-height: 10px;
            transition: height 0.5s ease;
        }

        .chart-bar::before {
            content: attr(data-calories);
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 600;
            color: var(--brown-color);
            white-space: nowrap;
        }

        .chart-label {
            margin-top: 10px;
            font-size: 14px;
            color: var(--text-color);
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--brown-color);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .hand-drawn-decoration {
            position: fixed;
            z-index: -1;
            opacity: 0.15;
        }

        .decoration-corn {
            top: 150px;
            right: 50px;
            width: 60px;
            height: 60px;
        }

        .decoration-egg {
            bottom: 200px;
            left: 50px;
            width: 50px;
            height: 50px;
        }

        .decoration-veggie {
            top: 400px;
            left: 100px;
            width: 45px;
            height: 45px;
        }

        @media (max-width: 768px) {
            .nav-tabs {
                flex-direction: column;
                align-items: center;
            }

            .nav-tab {
                width: 100%;
                max-width: 200px;
            }

            .food-grid {
                grid-template-columns: 1fr;
            }

            .chart-container {
                height: 200px;
            }

            .chart-bar::before {
                font-size: 10px;
                top: -25px;
            }
        }
    </style>
</head>
<body>
    <svg class="hand-drawn-decoration decoration-corn" viewBox="0 0 100 100">
        <path d="M50 10 L50 90 M50 10 L35 30 M50 10 L65 30 M50 30 L30 50 M50 30 L70 50 M50 50 L35 70 M50 50 L65 70 M50 70 L30 85 M50 70 L70 85" stroke="#967259" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="50" cy="15" r="8" fill="#dbc4a8"/>
        <circle cx="50" cy="90" r="6" fill="#967259"/>
    </svg>

    <svg class="hand-drawn-decoration decoration-egg" viewBox="0 0 100 100">
        <ellipse cx="50" cy="50" rx="40" ry="45" stroke="#967259" stroke-width="3" fill="none"/>
        <path d="M50 20 Q45 50 50 80" stroke="#d8a899" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="55" cy="35" r="8" fill="#f9f2e5"/>
    </svg>

    <svg class="hand-drawn-decoration decoration-veggie" viewBox="0 0 100 100">
        <ellipse cx="50" cy="60" rx="35" ry="30" stroke="#967259" stroke-width="3" fill="none"/>
        <path d="M50 30 L50 10 M50 30 L40 15 M50 30 L60 15" stroke="#967259" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="45" cy="55" r="8" fill="#d8a899" opacity="0.5"/>
        <circle cx="55" cy="65" r="6" fill="#c9a67c" opacity="0.5"/>
    </svg>

    <div class="header">
        <h1>🥗 减脂饮食小助理</h1>
    </div>

    <div class="nav-tabs">
        <div class="nav-tab active" data-tab="search">食材热量查询</div>
        <div class="nav-tab" data-tab="menu">菜单生成</div>
        <div class="nav-tab" data-tab="stats">周热量汇总</div>
    </div>

    <div class="content">
        <div id="search-tab" class="tab-content active">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="搜索食材...">
                <button id="search-btn">🔍 搜索</button>
            </div>

            <div class="category-tabs">
                <div class="category-tab active" data-category="全部">全部</div>
                <div class="category-tab" data-category="主食">主食</div>
                <div class="category-tab" data-category="蔬菜">蔬菜</div>
                <div class="category-tab" data-category="水果">水果</div>
                <div class="category-tab" data-category="肉类">肉类</div>
                <div class="category-tab" data-category="乳制品">乳制品</div>
                <div class="category-tab" data-category="零食">零食</div>
            </div>

            <div class="food-grid" id="food-grid"></div>
        </div>

        <div id="menu-tab" class="tab-content">
            <div class="menu-generator">
                <div class="input-section">
                    <div class="input-group">
                        <label>📊 每日目标热量 (kcal)</label>
                        <input type="number" id="target-calories" placeholder="请输入目标热量" value="1500">
                    </div>

                    <div class="input-group">

        function loadData() {
            const savedFoods = localStorage.getItem('customFoods');
            if (savedFoods) {
                const customFoods = JSON.parse(savedFoods);
                foods = [...foodDatabase, ...customFoods];
            }
        }

        function saveCustomFood(food) {
            const savedFoods = localStorage.getItem('customFoods');
            const customFoods = savedFoods ? JSON.parse(savedFoods) : [];
            food.id = Date.now();
            customFoods.push(food);
            localStorage.setItem('customFoods', JSON.stringify(customFoods));
            foods.push(food);
        }

        function getTodayKey() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        function getWeekKeys() {
            const keys = [];
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                keys.push(`${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`);
            }
            return keys;
        }

        function getDailyRecords(dateKey) {
            const records = localStorage.getItem(`daily_${dateKey}`);
            return records ? JSON.parse(records) : [];
        }

        function saveDailyRecord(record, dateKey) {
            const records = getDailyRecords(dateKey);
            record.id = Date.now();
            records.push(record);
            localStorage.setItem(`daily_${dateKey}`, JSON.stringify(records));
        }

        function deleteDailyRecord(recordId, dateKey) {
            const records = getDailyRecords(dateKey);
            const filtered = records.filter(r => r.id !== recordId);
            localStorage.setItem(`daily_${dateKey}`, JSON.stringify(filtered));
        }

        function calculateDailyCalories(dateKey) {
            const records = getDailyRecords(dateKey);
            return records.reduce((sum, r) => sum + r.calories, 0);
        }

        function renderFoodGrid(category = '全部', searchText = '') {
            const grid = document.getElementById('food-grid');
            let filteredFoods = foods;

            if (category !== '全部') {
                filteredFoods = filteredFoods.filter(f => f.category === category);
            }

            if (searchText) {
                filteredFoods = filteredFoods.filter(f => 
                    f.name.toLowerCase().includes(searchText.toLowerCase())
                );
            }

            if (filteredFoods.length === 0) {
                grid.innerHTML = '<div class="empty-state"><p>🍽️ 没有找到匹配的食材</p></div>';
                return;
            }

            grid.innerHTML = filteredFoods.map(food => `
                <div class="food-card">
                    <div class="food-icon">${food.icon || '🥦'}</div>
                    <div class="food-info">
                        <div class="food-name">${food.name}</div>
                        <span class="food-category">${food.category}</span>
                        <div class="food-calories">${food.calories} kcal/100g</div>
                    </div>
                    <button class="add-btn" onclick="openAddDietModal(${food.id})">+</button>
                </div>
            `).join('');
        }

        function openAddDietModal(foodId) {
            const food = foods.find(f => f.id === foodId);
            if (!food) return;

            currentFoodForDiet = food;
            document.getElementById('modal-food-name').textContent = `${food.icon} ${food.name} - ${food.calories} kcal/100g`;
            document.getElementById('consumed-grams').value = '';
            document.getElementById('add-diet-modal').classList.add('active');
        }

        function openAddFoodModal() {
            document.getElementById('new-food-name').value = '';
            document.getElementById('new-food-category').value = '';
            document.getElementById('new-food-calories').value = '';
            document.getElementById('add-modal').classList.add('active');
        }

        function generateMenu() {
            const targetCalories = parseInt(document.getElementById('target-calories').value) || 1500;
            const flavor = document.querySelector('.flavor-btn.active').dataset.flavor;

            const dayOfWeek = new Date().toLocaleDateString('en-US', { weekday: 'long' });
            const dayMeals = weeklyMeals[dayOfWeek];

            let totalCalories = 0;
            let totalCarbs = 0;
            let totalProtein = 0;
            let totalFat = 0;
            let allItems = [];
            let menuTitle = '';

            if (dayMeals) {
                const meals = [dayMeals.breakfast, dayMeals.lunch, dayMeals.dinner];
                meals.forEach(meal => {
                    totalCalories += meal.calories;
                    allItems = [...allItems, ...meal.items];
                });
                menuTitle = `${dayOfWeek} 减脂套餐`;
            } else {
                const availableMeals = completeMeals.filter(m => m.flavor === flavor || flavor === '中等');
                const mealCount = Math.floor(targetCalories / 400);
                const selectedMeals = [];
                
                for (let i = 0; i < Math.min(mealCount, 3); i++) {
                    const randomIndex = Math.floor(Math.random() * availableMeals.length);
                    selectedMeals.push(availableMeals[randomIndex]);
                }

                selectedMeals.forEach(meal => {
                    totalCalories += meal.calories;
                    totalCarbs += meal.carbs;
                    totalProtein += meal.protein;
                    totalFat += meal.fat;
                    allItems = [...allItems, ...meal.items];
                });
                menuTitle = '🍽️ 今日减脂菜单';
            }

            totalCarbs = Math.round(totalCalories * 0.5 / 4);
            totalProtein = Math.round(totalCalories * 0.3 / 4);
            totalFat = Math.round(totalCalories * 0.2 / 9);

            document.getElementById('menu-title').textContent = menuTitle;
            document.getElementById('menu-calories').textContent = `🍛 总计 ${totalCalories} kcal`;
            document.getElementById('carbs-tag').textContent = `🍞 碳水 ${totalCarbs}g`;
            document.getElementById('protein-tag').textContent = `🥩 蛋白质 ${totalProtein}g`;
            document.getElementById('fat-tag').textContent = `🧈 脂肪 ${totalFat}g`;

            const itemsHtml = allItems.map((item, index) => `
                <div class="menu-item">
                    <div>
                        <div class="menu-item-name">${index + 1}. ${item.name}</div>
                        <div class="menu-item-detail">${item.grams}g · ${item.calories} kcal</div>
                    </div>
                </div>
            `).join('');
            document.getElementById('menu-items').innerHTML = itemsHtml;
            document.getElementById('menu-display').style.display = 'block';
        }

        function renderDailyStats() {
            const todayKey = getTodayKey();
            const todayRecords = getDailyRecords(todayKey);
            const consumed = calculateDailyCalories(todayKey);
            const target = parseInt(localStorage.getItem('dailyTarget')) || 1500;
            const remaining = Math.max(0, target - consumed);

            document.getElementById('today-consumed').textContent = `${consumed} kcal`;
            document.getElementById('today-remaining').textContent = `${remaining} kcal`;
            document.getElementById('today-target').textContent = `${target} kcal`;

            const progress = Math.min(100, (consumed / target) * 100);
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const listItems = document.getElementById('daily-list-items');
            if (todayRecords.length === 0) {
                listItems.innerHTML = '<div class="empty-state"><p>📝 今日暂无饮食记录</p></div>';
                return;
            }

            listItems.innerHTML = todayRecords.map(record => `
                <div class="daily-item">
                    <div>
                        <div class="daily-item-name">${record.foodName}</div>
                        <div class="daily-item-detail">${record.grams}g</div>
                    </div>
                    <div class="daily-item-calories">${record.calories} kcal</div>
                    <button class="delete-btn" onclick="handleDeleteRecord(${record.id})">×</button>
                </div>
            `).join('');
        }

        function renderWeeklyChart() {
            const weekKeys = getWeekKeys();
            const dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            const calories = weekKeys.map(key => calculateDailyCalories(key));
            const maxCalories = Math.max(...calories, 1);

            const chart = document.getElementById('weekly-chart');
            chart.innerHTML = calories.map((cal, index) => {
                const height = Math.max(10, (cal / maxCalories) * 180);
                return `
                    <div class="chart-bar-wrapper">
                        <div class="chart-bar" style="height: ${height}px;" data-calories="${cal}"></div>
                        <div class="chart-label">${dayNames[index]}</div>
                    </div>
                `;
            }).join('');
        }

        function handleDeleteRecord(recordId) {
            const todayKey = getTodayKey();
            deleteDailyRecord(recordId, todayKey);
            renderDailyStats();
            renderWeeklyChart();
        }

        function handleSearch() {
            const searchText = document.getElementById('search-input').value;
            const activeCategory = document.querySelector('.category-tab.active').dataset.category;
            renderFoodGrid(activeCategory, searchText);
        }

        function init() {
            loadData();
            renderFoodGrid();
            renderDailyStats();
            renderWeeklyChart();

            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');
                    
                    if (tab.dataset.tab === 'stats') {
                        renderDailyStats();
                        renderWeeklyChart();
                    }
                });
            });

            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const searchText = document.getElementById('search-input').value;
                    renderFoodGrid(tab.dataset.category, searchText);
                });
            });

            document.querySelectorAll('.flavor-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.flavor-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });

            document.getElementById('search-btn').addEventListener('click', handleSearch);
            document.getElementById('search-input').addEventListener('keyup', (e) => {
                if (e.key === 'Enter') handleSearch();
            });

            document.getElementById('generate-menu').addEventListener('click', generateMenu);
            document.getElementById('add-food-btn').addEventListener('click', openAddFoodModal);

            document.getElementById('cancel-add').addEventListener('click', () => {
                document.getElementById('add-modal').classList.remove('active');
            });

            document.getElementById('confirm-add').addEventListener('click', () => {
                const name = document.getElementById('new-food-name').value.trim();
                const category = document.getElementById('new-food-category').value.trim();
                const calories = parseInt(document.getElementById('new-food-calories').value);

                if (!name || !category || isNaN(calories)) {
                    alert('请填写完整信息');
                    return;
                }

                const iconMap = {
                    '主食': '🍚', '蔬菜': '🥦', '水果': '🍎', 
                    '肉类': '🥩', '乳制品': '🥛', '零食': '🍪'
                };

                saveCustomFood({
                    name,
                    category,
                    calories,
                    icon: iconMap[category] || '🥦'
                });

                document.getElementById('add-modal').classList.remove('active');
                const activeCategory = document.querySelector('.category-tab.active').dataset.category;
                renderFoodGrid(activeCategory);
            });

            document.getElementById('cancel-diet').addEventListener('click', () => {
                document.getElementById('add-diet-modal').classList.remove('active');
            });

            document.getElementById('confirm-diet').addEventListener('click', () => {
                const grams = parseInt(document.getElementById('consumed-grams').value);
                if (!currentFoodForDiet || isNaN(grams) || grams <= 0) {
                    alert('请输入有效克数');
                    return;
                }

                const calories = Math.round((currentFoodForDiet.calories / 100) * grams);
                saveDailyRecord({
                    foodName: currentFoodForDiet.name,
                    grams,
                    calories
                }, getTodayKey());

                document.getElementById('add-diet-modal').classList.remove('active');
                renderDailyStats();
                renderWeeklyChart();
            });

            document.getElementById('target-calories').addEventListener('change', (e) => {
                localStorage.setItem('dailyTarget', e.target.value);
                renderDailyStats();
            });
        }

        init();
    </script>
</body>
</html>
